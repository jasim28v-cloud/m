<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية الظل | LIVE STREAM</title>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #ff0050; --secondary: #00f2ea; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        
        /* واجهة تيك توك */
        #main-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #main-feed::-webkit-scrollbar { display: none; }
        .v-card { position: relative; height: 100vh; width: 100%; scroll-snap-align: start; display: flex; justify-content: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; max-width: 500px; }
        
        .logo { position: fixed; top: 20px; right: 20px; z-index: 1000; font-weight: bold; background: linear-gradient(45deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; font-size: 22px; filter: drop-shadow(0 0 5px rgba(255,0,80,0.5)); }
        .overlay { position: absolute; bottom: 40px; left: 20px; text-shadow: 2px 2px 10px #000; z-index: 10; pointer-events: none; }
        
        /* لوحة التحكم السرية */
        #admin-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .admin-box { background: #111; border: 2px solid var(--primary); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--secondary); color: #fff; border-radius: 8px; }
        .btn { width: 100%; padding: 12px; background: var(--primary); border: none; color: #fff; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="logo" id="adminTrigger">SHΔDØW.EXE</div>

    <div id="main-feed">
        </div>

    <div id="admin-gate">
        <div class="admin-box">
            <h2 style="color: var(--secondary)">تحكم المعماري</h2>
            <input type="password" id="adminPass" placeholder="كلمة المرور">
            <button class="btn" onclick="verify()">دخول</button>
            <div id="uploadSection" style="display:none">
                <button id="upload_widget" class="btn" style="background:var(--secondary); color:#000">رفع فيديو للعامة 🔥</button>
            </div>
            <button onclick="document.getElementById('admin-gate').style.display='none'" style="background:none; border:none; color:#555; margin-top:15px; cursor:pointer">إغلاق</button>
        </div>
    </div>

    <script>
        // 1. حقن الرابط السحري الذي أرسلته
        const firebaseConfig = {
            databaseURL: "https://porn-dc411-default-rtdb.firebaseio.com/" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. جلب الفيديوهات (عام لكل الناس)
        db.ref('videos').on('value', (snapshot) => {
            const feed = document.getElementById('main-feed');
            feed.innerHTML = ''; 
            const data = snapshot.val();
            for (let id in data) {
                const v = data[id];
                const card = document.createElement('div');
                card.className = 'v-card';
                card.innerHTML = `
                    <video loop playsinline onclick="this.paused?this.play():this.pause()">
                        <source src="${v.url}" type="video/mp4">
                    </video>
                    <div class="overlay">
                        <h3>@Master_Admin</h3>
                        <p>بث مباشر من السحابة</p>
                    </div>
                `;
                feed.prepend(card); 
            }
            refreshObserver();
        });

        // 3. نظام الرفع (Admin)
        var myWidget = cloudinary.createUploadWidget({
            cloudName: "dssk5tabb", 
            uploadPreset: "ml_default" // تأكد أن اسمه صحيح في إعدادات Cloudinary
        }, (error, result) => {
            if (!error && result && result.event === "success") {
                db.ref('videos').push({
                    url: result.info.secure_url,
                    created_at: Date.now()
                });
                alert("تم النشر بنجاح!");
            }
        });

        document.getElementById("upload_widget").onclick = () => myWidget.open();

        // 4. نظام الدخول السري (ضغط مطول 2 ثانية)
        let timer;
        document.getElementById("adminTrigger").onmousedown = () => timer = setTimeout(() => document.getElementById('admin-gate').style.display='flex', 2000);
        document.getElementById("adminTrigger").onmouseup = () => clearTimeout(timer);
        
        function verify() {
            if(document.getElementById('adminPass').value === "1234") {
                document.getElementById('uploadSection').style.display = 'block';
                document.getElementById('adminPass').style.display = 'none';
            }
        }

        function refreshObserver() {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(e => { const v = e.target.querySelector('video'); if(v) e.isIntersecting ? v.play() : v.pause(); });
            }, { threshold: 0.6 });
            document.querySelectorAll('.v-card').forEach(s => observer.observe(s));
        }
    </script>
</body>
</html>
