<div style="font-family: Arial, sans-serif; text-align: center; background: #1a1a1a; color: white; padding: 20px; border-radius: 10px;">
    <h2>🎥 مكتبة الأفلام (31 فيديو)</h2>
    
    <video id="mainPlayer" width="100%" controls style="max-width: 800px; border: 3px solid #ff4500; border-radius: 10px; box-shadow: 0 0 15px rgba(255, 69, 0, 0.5);">
        <source src="https://res.cloudinary.com/dssk5tabb/video/upload/01_Itzbic.mp4" type="video/mp4">
    </video>
    
    <h3 id="currentTitle" style="margin-top: 15px; color: #ff4500;">أنت تشاهد الآن: فيديو 01</h3>

    <div id="playlist" style="margin-top: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; max-width: 800px; margin-left: auto; margin-right: auto; max-height: 200px; overflow-y: auto; padding: 10px; background: #333; border-radius: 5px;">
        </div>
</div>

<script>
    const playlistDiv = document.getElementById('playlist');
    const player = document.getElementById('mainPlayer');
    const titleText = document.getElementById('currentTitle');

    // إنشاء 31 زر تلقائياً
    for (let i = 1; i <= 31; i++) {
        let num = i < 10 ? '0' + i : i; // إضافة صفر للأرقام أقل من 10
        let btn = document.createElement('button');
        btn.innerText = num;
        btn.style = "padding: 10px; cursor: pointer; background: #444; color: white; border: none; border-radius: 3px; font-weight: bold;";
        btn.onclick = function() {
            let videoUrl = `https://res.cloudinary.com/dssk5tabb/video/upload/${num}_Itzbic.mp4`;
            player.src = videoUrl;
            titleText.innerText = "أنت تشاهد الآن: فيديو " + num;
            player.play();
            // تمييز الزر النشط
            document.querySelectorAll('#playlist button').forEach(b => b.style.background = '#444');
            btn.style.background = '#ff4500';
        };
        playlistDiv.appendChild(btn);
    }
</script>
