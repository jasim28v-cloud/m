<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية الظل | SHΔDØW EMPIRE</title>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff0050; --s: #00f2ea; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; overflow: hidden; }

        /* واجهة العرض الرئيسية */
        #main-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #main-feed::-webkit-scrollbar { display: none; }
        .v-card { position: relative; height: 100vh; width: 100%; scroll-snap-align: start; display: flex; justify-content: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; max-width: 500px; cursor: pointer; }

        /* العناصر العائمة */
        .logo { position: fixed; top: 20px; right: 20px; font-family: 'Orbitron'; font-size: 22px; z-index: 1000; cursor: pointer; background: linear-gradient(45deg, var(--p), var(--s)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(255,0,80,0.5)); }
        .overlay { position: absolute; bottom: 40px; left: 20px; text-shadow: 2px 2px 10px #000; z-index: 10; pointer-events: none; }
        .side-icons { position: absolute; right: 20px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; z-index: 10; }
        .icon-btn { width: 50px; height: 50px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }

        /* لوحة التحكم الإدارية */
        #admin-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .admin-box { background: #111; border: 2px solid var(--p); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--s); color: #fff; border-radius: 8px; }
        .btn-action { width: 100%; padding: 12px; background: var(--p); border: none; color: #fff; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="logo" id="adminTrigger">SHΔDØW.EXE</div>

    <div id="main-feed">
        </div>

    <div id="admin-gate">
        <div class="admin-box">
            <h2 style="color: var(--s)">غرفة التحكم السرية</h2>
            <input type="password" id="adminPass" placeholder="كلمة المرور">
            <button class="btn-action" onclick="verifyAdmin()">دخول النظام</button>
            <div id="uploadSection" style="display:none">
                <input type="text" id="vidDesc" placeholder="وصف الفيديو...">
                <button id="upload_widget" class="btn-action" style="background:var(--s); color:#000">رفع فيديو للسحابة 🔥</button>
            </div>
            <button onclick="closeAdmin()" style="background:none; border:none; color:#555; margin-top:15px; cursor:pointer">إغلاق</button>
        </div>
    </div>

    <script>
        // 1. إعدادات Firebase (يجب أن تضع بياناتك هنا ليعمل الموقع للعامة)
        const firebaseConfig = {
            databaseURL: "https://YOUR_PROJECT_ID.firebaseio.com" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. إعدادات Cloudinary
        const CLOUD_NAME = "dssk5tabb";
        const UPLOAD_PRESET = "ml_default"; // تأكد أنه Unsigned

        // 3. جلب الفيديوهات وعرضها للعامة (تلقائي)
        db.ref('videos').on('value', (snapshot) => {
            const feed = document.getElementById('main-feed');
            feed.innerHTML = ''; // مسح القديم
            const data = snapshot.val();
            for (let id in data) {
                const v = data[id];
                const card = document.createElement('div');
                card.className = 'v-card';
                card.innerHTML = `
                    <video loop playsinline onclick="this.paused?this.play():this.pause()">
                        <source src="${v.url}" type="video/mp4">
                    </video>
                    <div class="side-icons">
                        <div class="icon-btn">❤️</div>
                        <div class="icon-btn">💬</div>
                    </div>
                    <div class="overlay">
                        <h3>@${v.user}</h3>
                        <p>${v.desc}</p>
                    </div>
                `;
                feed.prepend(card); // الجديد يظهر في الأعلى
            }
            refreshObserver();
        });

        // 4. نظام الرفع (لصاحب الموقع فقط)
        var myWidget = cloudinary.createUploadWidget({
            cloudName: CLOUD_NAME, uploadPreset: UPLOAD_PRESET,
            sources: ['local', 'camera']
        }, (error, result) => {
            if (!error && result && result.event === "success") {
                const desc = document.getElementById('vidDesc').value || "بدون وصف";
                db.ref('videos').push({
                    url: result.info.secure_url,
                    user: "Master",
                    desc: desc
                });
                alert("تم النشر للعامة بنجاح!");
            }
        });

        document.getElementById("upload_widget").onclick = () => myWidget.open();

        // 5. وظائف الإدارة
        let timer;
        document.getElementById("adminTrigger").onmousedown = () => timer = setTimeout(() => document.getElementById('admin-gate').style.display='flex', 2000);
        document.getElementById("adminTrigger").onmouseup = () => clearTimeout(timer);
        
        function verifyAdmin() {
            if(document.getElementById('adminPass').value === "1234") {
                document.getElementById('uploadSection').style.display = 'block';
                document.getElementById('adminPass').style.display = 'none';
            }
        }
        function closeAdmin() { document.getElementById('admin-gate').style.display='none'; }

        // 6. محرك التشغيل التلقائي عند التمرير
        function refreshObserver() {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(e => { const v = e.target.querySelector('video'); if(v) e.isIntersecting ? v.play() : v.pause(); });
            }, { threshold: 0.6 });
            document.querySelectorAll('.v-card').forEach(s => observer.observe(s));
        }
    </script>
</body>
</html>
